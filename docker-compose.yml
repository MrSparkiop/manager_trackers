version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: client_tracker_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: client_tracker
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: client_tracker_backend
    restart: always
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/client_tracker
      JWT_SECRET: super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: super-secret-refresh-key-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://184.174.39.140,http://184.174.39.140:5173
      NODE_ENV: development
      SENTRY_DSN: https://94769800094c89bd68eef8b19bc3438a@o4510969166823424.ingest.de.sentry.io/4510969200181328
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run start:dev"
    volumes:
      # Mount the entire backend folder for config/schema hot-reloading
      - ./backend:/app
      # Create an anonymous volume to keep Linux node_modules isolated
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: client_tracker_frontend
    restart: always
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:3000/api
    depends_on:
      - backend
    volumes:
      # Mount the entire frontend folder for config hot-reloading
      - ./frontend:/app
      # Create an anonymous volume to keep Linux node_modules isolated
      - /app/node_modules

volumes:
  postgres_data: