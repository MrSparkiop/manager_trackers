version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: client_tracker_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: client_tracker
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: client_tracker_migrator
    environment:
      DATABASE_URL: "${DATABASE_URL}"
    depends_on:
      postgres:
        condition: service_healthy
    command: npx prisma migrate deploy
    restart: "no"
    volumes:
      - ./backend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: client_tracker_backend
    restart: always
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://184.174.39.140,http://184.174.39.140:5173,capacitor://localhost,http://localhost
      NODE_ENV: development
      SENTRY_DSN: "${SENTRY_DSN_BACKEND}"
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    command: npm run start:dev
    volumes:
      # Mount the entire backend folder for config/schema hot-reloading
      - ./backend:/app
      # Create an anonymous volume to keep Linux node_modules isolated
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: client_tracker_frontend
    restart: always
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: /api
      VITE_SOCKET_URL: ""
      BACKEND_URL: http://backend:3000
    depends_on:
      - backend
    volumes:
      # Mount the entire frontend folder for config hot-reloading
      - ./frontend:/app
      # Create an anonymous volume to keep Linux node_modules isolated
      - /app/node_modules

volumes:
  postgres_data: